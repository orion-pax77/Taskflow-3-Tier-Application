apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: taskflow
type: Opaque
# Values are base64 encoded
# echo -n 'taskflowuser' | base64  → dGFza2Zsb3d1c2Vy
# echo -n 'taskflow@Pass123' | base64 → dGFza2Zsb3dAUGFzczEyMw==
data:
  mongo-username: dGFza2Zsb3d1c2Vy
  mongo-password: dGFza2Zsb3dAUGFzczEyMw==
