apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/orion-pax77/3-tier-project.git
    targetRevision: main
    path: k8s_manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: taskflow

  syncPolicy:
    automated:
      prune: true       # Delete resources removed from Git
      selfHeal: true    # Fix manual changes that drift from Git
    syncOptions:
      - CreateNamespace=true
